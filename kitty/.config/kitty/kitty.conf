# ┌─────────────────────────────────────────────────────────────┐
# │  Stormdot · kitty.conf                                      │
# │  Terminal: JetBrainsMono Nerd Font + Nord + blur            │
# └─────────────────────────────────────────────────────────────┘
#
# Reload en caliente: Ctrl+Shift+F5
# Docs: https://sw.kovidgoyal.net/kitty/conf/


# ══════════════════════════════════════════════════════════════
#   FUENTE
# ══════════════════════════════════════════════════════════════

font_family       JetBrainsMono Nerd Font
bold_font         JetBrainsMono Nerd Font Bold
italic_font       JetBrainsMono Nerd Font Italic
bold_italic_font  JetBrainsMono Nerd Font Bold Italic

font_size         11.0

# Ajuste fino de espaciado
adjust_line_height    0
adjust_column_width   0

# Ligaduras (JetBrains Mono las soporta: != -> => etc.)
disable_ligatures     never

# Mapeo de símbolos a Nerd Font (por si el sistema no resuelve bien los glifos)
symbol_map U+E000-U+F8FF,U+F0000-U+FFFFD,U+100000-U+10FFFD JetBrainsMono Nerd Font


# ══════════════════════════════════════════════════════════════
#   CURSOR
# ══════════════════════════════════════════════════════════════

cursor_shape              beam
cursor_beam_thickness     1.8
cursor_blink_interval     0.5
cursor_stop_blinking_after 15.0


# ══════════════════════════════════════════════════════════════
#   SCROLLBACK
# ══════════════════════════════════════════════════════════════

scrollback_lines              10000
scrollback_pager              less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0
wheel_scroll_multiplier       5.0


# ══════════════════════════════════════════════════════════════
#   RATÓN Y SELECCIÓN
# ══════════════════════════════════════════════════════════════

mouse_hide_wait         3.0
url_color               #88c0d0
url_style               curly
open_url_with           default
copy_on_select          no
strip_trailing_spaces   smart


# ══════════════════════════════════════════════════════════════
#   VENTANA
# ══════════════════════════════════════════════════════════════

remember_window_size    yes
initial_window_width    120c
initial_window_height   32c

window_padding_width    8
window_margin_width     0
single_window_margin_width -1
window_border_width     0.5pt
draw_minimal_borders    yes

# Sin bordes del SO (deja que Hyprland lo gestione)
hide_window_decorations yes

# Confirmar al cerrar si hay procesos
confirm_os_window_close 0


# ══════════════════════════════════════════════════════════════
#   TRANSPARENCIA / BLUR
# ══════════════════════════════════════════════════════════════
#
# El blur real lo hace Hyprland (regla de ventana más abajo).
# Aquí solo la transparencia de fondo.

background_opacity             0.75
dynamic_background_opacity     yes
background_blur                1


# ══════════════════════════════════════════════════════════════
#   PESTAÑAS
# ══════════════════════════════════════════════════════════════

tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal


# ══════════════════════════════════════════════════════════════
#   CAMPANA
# ══════════════════════════════════════════════════════════════

enable_audio_bell       no
visual_bell_duration    0.0
window_alert_on_bell    yes
bell_on_tab             yes


# ══════════════════════════════════════════════════════════════
#   SHELL
# ══════════════════════════════════════════════════════════════

shell                   fish
shell_integration       enabled
editor                  nvim


# ══════════════════════════════════════════════════════════════
#   KEYBINDS
# ══════════════════════════════════════════════════════════════

# Clipboard
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Font size
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Scrollback
map ctrl+shift+up       scroll_line_up
map ctrl+shift+down     scroll_line_down
map ctrl+shift+page_up  scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home     scroll_home
map ctrl+shift+end      scroll_end

# Tabs
map ctrl+shift+t        new_tab
map ctrl+shift+q        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+l        next_layout

# Reload config
map ctrl+shift+f5       load_config_file


# ══════════════════════════════════════════════════════════════
#   TEMA: NORD
#   https://www.nordtheme.com/docs/colors-and-palettes
# ══════════════════════════════════════════════════════════════

# Polar Night (fondo)
background              #2e3440
foreground              #d8dee9
selection_background    #4c566a
selection_foreground    #d8dee9

# Cursor
cursor                  #d8dee9
cursor_text_color       #2e3440

# Bordes de ventana
active_border_color     #88c0d0
inactive_border_color   #4c566a
bell_border_color       #ebcb8b

# Tabs
active_tab_background   #88c0d0
active_tab_foreground   #2e3440
inactive_tab_background #3b4252
inactive_tab_foreground #d8dee9
tab_bar_background      #2e3440

# Colores normales (Polar Night + Aurora)
color0  #3b4252
color1  #bf616a
color2  #a3be8c
color3  #ebcb8b
color4  #81a1c1
color5  #b48ead
color6  #88c0d0
color7  #e5e9f0

# Colores brillantes (Snow Storm + Frost)
color8   #4c566a
color9   #bf616a
color10  #a3be8c
color11  #ebcb8b
color12  #81a1c1
color13  #b48ead
color14  #8fbcbb
color15  #eceff4
