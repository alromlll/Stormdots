# ┌─────────────────────────────────────────────────────────────┐
# │  Stormdot · hyprlock.conf                                   │
# │  Pantalla de bloqueo: reloj + fecha + password              │
# │  Fondo: wallpaper actual con blur                           │
# │  Docs: https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/      │
# └─────────────────────────────────────────────────────────────┘

# Config general
general {
    disable_loading_bar = true
    grace               = 2       # Segundos antes de pedir password (mover ratón lo cancela)
    hide_cursor         = true
    no_fade_in          = false
    ignore_empty_input  = true
}

# ══════════════════════════════════════════════════════════════
#   FONDO — wallpaper con blur
# ══════════════════════════════════════════════════════════════
#
# El path apunta al mismo wallpaper que carga hyprland.conf.
# Si usas rotación de wallpapers, puedes escribir el path actual
# a ~/.cache/current-wallpaper y cambiar `path` por esa ruta.

background {
    monitor =
    path    = ~/Pictures/Wallpapers/Themes/1.Thunder.jpg
    color   = rgba(46, 52, 64, 1.0)   # Fallback: nord0 (Polar Night)

    blur_passes  = 3
    blur_size    = 8
    noise        = 0.0117
    contrast     = 0.8916
    brightness   = 0.6            # Ligeramente oscurecido para legibilidad
    vibrancy     = 0.1696
    vibrancy_darkness = 0.0
}


# ══════════════════════════════════════════════════════════════
#   RELOJ — grande, centrado-superior
# ══════════════════════════════════════════════════════════════

label {
    monitor     =
    text        = cmd[update:1000] echo "<b>$(date +'%H:%M')</b>"
    color       = rgba(236, 239, 244, 1.0)    # nord6 (Snow Storm)
    font_size   = 120
    font_family = JetBrainsMono Nerd Font

    position    = 0, 200
    halign      = center
    valign      = center
}


# ══════════════════════════════════════════════════════════════
#   FECHA — debajo del reloj
# ══════════════════════════════════════════════════════════════

label {
    monitor     =
    text        = cmd[update:43200000] echo "$(date +'%A, %d de %B')"
    color       = rgba(216, 222, 233, 1.0)    # nord4
    font_size   = 22
    font_family = JetBrainsMono Nerd Font

    position    = 0, 90
    halign      = center
    valign      = center
}


# ══════════════════════════════════════════════════════════════
#   AVISO — usuario
# ══════════════════════════════════════════════════════════════

label {
    monitor     =
    text        = Hola, $USER
    color       = rgba(136, 192, 208, 1.0)    # nord8 (frost cyan)
    font_size   = 16
    font_family = JetBrainsMono Nerd Font

    position    = 0, -80
    halign      = center
    valign      = center
}


# ══════════════════════════════════════════════════════════════
#   CAMPO DE PASSWORD
# ══════════════════════════════════════════════════════════════

input-field {
    monitor       =
    size          = 320, 54
    outline_thickness = 2
    dots_size     = 0.2
    dots_spacing  = 0.35
    dots_center   = true
    dots_rounding = -1

    outer_color   = rgba(136, 192, 208, 1.0)    # nord8
    inner_color   = rgba(46, 52, 64, 0.75)      # nord0 translúcido
    font_color    = rgba(236, 239, 244, 1.0)    # nord6
    fade_on_empty = false
    fade_timeout  = 1000

    placeholder_text = <i>Password...</i>
    hide_input    = false
    rounding      = 12

    check_color   = rgba(163, 190, 140, 1.0)    # nord14 verde — verificando
    fail_color    = rgba(191, 97, 106, 1.0)     # nord11 rojo — error
    fail_text     = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300

    capslock_color = rgba(235, 203, 139, 1.0)   # nord13 amarillo — caps lock

    position      = 0, -150
    halign        = center
    valign        = center
}
