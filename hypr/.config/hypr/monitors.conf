# ┌─────────────────────────────────────────────────────────────┐
# │  Stormdot · monitors.conf                                   │
# │  Configuración de monitores.                                │
# └─────────────────────────────────────────────────────────────┘
#
# Formato: monitor = NAME,RESOLUTION@REFRESH,POSITION,SCALE
# Lista:   hyprctl monitors
#
# WS2 — Laptop Lenovo (eDP-1): 1920x1080@60Hz, scale 1.25

monitor = eDP-1, 1920x1080@60, 0x0, 1.25

# Fallback: cualquier monitor desconocido usa resolución preferida
monitor = , preferred, auto, 1


# ─── Plantillas para añadir monitores externos ────────
#
# Monitor externo HDMI a la derecha del laptop (sin scale):
# monitor = HDMI-A-1, 1920x1080@60, 1536x0, 1
#
# Monitor 2K/QHD DisplayPort a la izquierda:
# monitor = DP-1, 2560x1440@60, -2560x0, 1
#
# Deshabilitar el laptop cuando hay externo conectado:
# monitor = eDP-1, disable
