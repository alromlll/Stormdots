# ┌─────────────────────────────────────────────────────────────┐
# │  Stormdot · hypridle.conf                                   │
# │  Daemon de inactividad — auto-lock + DPMS + suspend         │
# │  Docs: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/      │
# └─────────────────────────────────────────────────────────────┘

general {
    lock_cmd     = pidof hyprlock || hyprlock       # Evita lanzar hyprlock duplicado
    before_sleep_cmd = loginctl lock-session        # Lock antes de suspender
    after_sleep_cmd  = hyprctl dispatch dpms on     # Reencender pantalla al despertar
    ignore_dbus_inhibit = false                     # Respetar inhibitors (vídeo reproduciéndose, etc.)
}

# ── 5 minutos: avisar + bloquear ─────────────────────────────
listener {
    timeout = 300                                    # 5 min
    on-timeout = loginctl lock-session              # Dispara hyprlock vía lock_cmd
}

# ── 10 minutos: apagar pantalla ──────────────────────────────
listener {
    timeout = 600                                    # 10 min
    on-timeout = hyprctl dispatch dpms off           # Apaga pantalla
    on-resume  = hyprctl dispatch dpms on            # Enciende al volver
}

# ── 30 minutos: suspender (solo si el laptop está con batería) ──
listener {
    timeout = 1800                                   # 30 min
    on-timeout = systemctl suspend                  # Suspend a RAM
}
