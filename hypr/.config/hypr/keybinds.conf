# ┌─────────────────────────────────────────────────────────────┐
# │  Stormdot · keybinds.conf                                   │
# │  Todos los keybinds en un solo lugar.                       │
# └─────────────────────────────────────────────────────────────┘
#
# Tipos de bind en Hyprland:
#   bind   — normal (una pulsación)
#   binde  — repite mientras mantengas pulsado (resize, volumen)
#   bindl  — funciona con pantalla bloqueada (multimedia)
#   bindel — combina l + e
#   bindm  — para ratón (drag)

$mainMod = SUPER


# ═══════════════════════════════════════════════════════════════
#   APLICACIONES
# ═══════════════════════════════════════════════════════════════

bind = $mainMod,       K, exec, $terminal         # Kitty
bind = $mainMod,       E, exec, $fileManager      # Dolphin
bind = $mainMod,       A, exec, $menu             # Rofi (app launcher)
bind = $mainMod,       B, exec, $browser          # Brave

# Menú de portapapeles con cliphist + rofi
bind = $mainMod,       C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy


# ═══════════════════════════════════════════════════════════════
#   GESTIÓN DE VENTANAS
# ═══════════════════════════════════════════════════════════════

bind = $mainMod,       Q, killactive,
bind = $mainMod,       V, togglefloating,
bind = $mainMod,       P, pseudo,                 # dwindle: pseudotile
bind = $mainMod,       J, togglesplit,            # dwindle: cambiar dirección
bind = $mainMod,       F, fullscreen, 0           # fullscreen real
bind = $mainMod SHIFT, F, fullscreen, 1           # maximize sin ocultar barra


# ═══════════════════════════════════════════════════════════════
#   SALIR / BLOQUEAR
# ═══════════════════════════════════════════════════════════════

bind = $mainMod,       L, exec, hyprlock          # Bloquear pantalla
bind = $mainMod,       M, exec, wlogout           # Menú logout/reboot/shutdown
bind = $mainMod SHIFT, M, exit,                   # Salir de Hyprland (force)


# ═══════════════════════════════════════════════════════════════
#   FOCO DE VENTANAS (flechas)
# ═══════════════════════════════════════════════════════════════

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d


# ═══════════════════════════════════════════════════════════════
#   MOVER VENTANAS (mainMod + SHIFT + flechas)
# ═══════════════════════════════════════════════════════════════

bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d


# ═══════════════════════════════════════════════════════════════
#   RESIZE (mainMod + CTRL + flechas — usa binde para repetición)
# ═══════════════════════════════════════════════════════════════

binde = $mainMod CTRL, right, resizeactive,  30   0
binde = $mainMod CTRL, left,  resizeactive, -30   0
binde = $mainMod CTRL, up,    resizeactive,   0 -30
binde = $mainMod CTRL, down,  resizeactive,   0  30


# ═══════════════════════════════════════════════════════════════
#   WORKSPACES
# ═══════════════════════════════════════════════════════════════

# Cambiar de workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover ventana activa a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad (workspace especial invocable desde cualquier workspace)
bind = $mainMod,       S,     togglespecialworkspace, magic
bind = $mainMod SHIFT, grave, movetoworkspace,        special:magic

# Scroll del ratón para cambiar workspace
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Mover/redimensionar con ratón
bindm = $mainMod, mouse:272, movewindow     # LMB
bindm = $mainMod, mouse:273, resizewindow   # RMB


# ═══════════════════════════════════════════════════════════════
#   CAPTURAS DE PANTALLA (grimblast)
# ═══════════════════════════════════════════════════════════════

# Seleccionar área y copiar al portapapeles
bind = $mainMod SHIFT, S, exec, grimblast copy area

# Pantalla completa al portapapeles
bind = ,          Print, exec, grimblast copy screen

# Seleccionar área y guardar en ~/Pictures/Screenshots
bind = $mainMod,  Print, exec, grimblast save area ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png


# ═══════════════════════════════════════════════════════════════
#   TECLAS MULTIMEDIA Y BRILLO
# ═══════════════════════════════════════════════════════════════

# Volumen (bindel: funciona bloqueado + repite)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume          @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute            @DEFAULT_AUDIO_SINK@   toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute            @DEFAULT_AUDIO_SOURCE@ toggle

# Brillo (binde: repite al mantener)
binde = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set  5%-

# Reproducción multimedia (bindl: funciona con pantalla bloqueada)
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous
