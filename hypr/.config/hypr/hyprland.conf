# ┌─────────────────────────────────────────────────────────────┐
# │  Stormdot · hyprland.conf                                   │
# │  Config principal. Keybinds y monitores en archivos aparte. │
# └─────────────────────────────────────────────────────────────┘

# Archivos externos (las variables $terminal, $menu, etc. están
# definidas dentro de keybinds.conf para que estén disponibles
# cuando los binds las usan — si estuvieran aquí abajo, los binds
# las verían vacías por orden de carga).
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/keybinds.conf


#################
### AUTOSTART ###
#################

# Barra de estado
exec-once = waybar

# Wallpaper daemon + wallpaper inicial (awww, sucesor de swww)
exec-once = awww-daemon
exec-once = awww img ~/Pictures/Wallpapers/Themes/1.Thunder.jpg

# Agente de autenticación (polkit)
exec-once = systemctl --user start hyprpolkitagent

# Portapapeles persistente (historial manejado por cliphist)
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Daemon de inactividad (auto-lock con hyprlock)
exec-once = hypridle

# Script de inicio personalizado (apps, ajustes extra, etc.)
exec-once = ~/.config/hypr/scripts/inicio.sh


#############################
### VARIABLES DE ENTORNO  ###
#############################

# Cursor — activo cuando instales bibata-cursor-theme
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16

# Tema Qt/GTK en oscuro
env = GTK_THEME,Adwaita:dark
env = QT_QPA_PLATFORMTHEME,qt5ct

# Wayland nativo para toolkits
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 2
    gaps_out = 4

    border_size = 1

    col.active_border   = rgba(ffffffff) rgba(888888ff) 45deg
    col.inactive_border = rgba(333333aa)

    resize_on_border = false
    allow_tearing    = false

    layout = dwindle
}

decoration {
    rounding       = 8
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 8
        render_power = 2
        color        = rgba(00000099)
    }

    blur {
        enabled  = true
        size     = 5
        passes   = 2
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor,    1, 7,    quick
}

dwindle {
    pseudotile      = true
    preserve_split  = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}


#############
### INPUT ###
#############

input {
    kb_layout  = es
    kb_variant =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace


##############################
### REGLAS DE VENTANAS     ###
##############################

windowrule {
    name          = suppress-maximize-events
    match:class   = .*
    suppress_event = maximize
}

windowrule {
    name              = fix-xwayland-drags
    match:class       = ^$
    match:title       = ^$
    match:xwayland    = true
    match:float       = true
    match:fullscreen  = false
    match:pin         = false
    no_focus          = true
}

# Floating para diálogos y apps de sistema
windowrule {
    name        = float-dialogs
    match:class = ^(pavucontrol|nwg-look|wlogout|blueman-manager|nm-connection-editor)$
    float       = yes
}

# Blur extra para kitty (además del blur global)
windowrule {
    name        = kitty-opacity
    match:class = ^(kitty)$
    opacity     = 0.85 0.75
}
