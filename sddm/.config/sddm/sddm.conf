# ┌─────────────────────────────────────────────────────────────┐
# │  Stormdot · SDDM config                                     │
# │  Instalado en /etc/sddm.conf.d/stormdot.conf por install.sh │
# └─────────────────────────────────────────────────────────────┘

[General]
# Sesión Wayland por defecto
InputMethod=
DisplayServer=wayland

[Theme]
Current=stormdot
CursorTheme=Bibata-Modern-Ice
CursorSize=24
Font=JetBrainsMono Nerd Font

[Wayland]
# Comando que lanza el compositor del greeter (el propio SDDM)
CompositorCommand=kwin_wayland --drm --no-lockscreen --no-global-shortcuts --locale1
# Sesión de usuario por defecto (cuando elija en el login)
SessionDir=/usr/share/wayland-sessions

[Users]
# Usuario por defecto mostrado en el campo
MaximumUid=60000
MinimumUid=1000
HideUsers=
HideShells=/sbin/nologin,/bin/false
RememberLastUser=true
RememberLastSession=true
